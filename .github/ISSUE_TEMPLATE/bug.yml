name: Bug report
description: Report reproducible incorrect behavior in Brain Hands.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private repository content, personal data, or unredacted run artifacts.
  - type: input
    id: version
    attributes:
      label: Brain Hands version
      placeholder: 0.3.5
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include Node.js version, operating system, and Codex version when relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest safe sequence that demonstrates the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Redact paths, tokens, private content, and unrelated logs.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private data, and private repository content.
          required: true
