name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - name: Check out the release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify the trusted-publishing toolchain
        run: node scripts/check-release-toolchain.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Layered verification funnel
        run: npm run verify:funnel

      - name: Validate immutable release context
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            test "$GITHUB_REF_TYPE" = "tag"
            test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = "tag"
            test "$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{}")" = "$GITHUB_SHA"
            test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
            npm run validate-release -- --json --tag "$GITHUB_REF_NAME" --repository "$GITHUB_REPOSITORY"
          else
            npm run validate-release -- --json
          fi

      - name: Inspect the package artifact
        run: npm pack --dry-run --json --ignore-scripts

  publish:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out the tagged release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify the trusted-publishing toolchain
        run: node scripts/check-release-toolchain.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build release files
        run: npm run build

      - name: Revalidate the publish context
        run: npm run validate-release -- --json --tag "$GITHUB_REF_NAME" --repository "$GITHUB_REPOSITORY"

      - name: Publish and verify the exact artifact
        run: node scripts/publish-release.mjs --tag "$GITHUB_REF_NAME" --commit "$GITHUB_SHA" --repository "$GITHUB_REPOSITORY"
